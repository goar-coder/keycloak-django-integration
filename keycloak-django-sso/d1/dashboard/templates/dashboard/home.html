{% extends "dashboard/base.html" %}
{% block content %}
<h1>Welcome to D1</h1>
{% if user.is_authenticated %}
    <p>You are logged in as <strong>{{ user.email }}</strong>.</p>
    <a href="/dashboard/">Go to Dashboard</a>
{% else %}
    <p>This application requires Keycloak authentication.</p>
    <a href="/oidc/authenticate/">Login with Keycloak</a>
{% endif %}
{% endblock %}
