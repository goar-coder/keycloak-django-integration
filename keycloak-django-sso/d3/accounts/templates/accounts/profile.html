{% extends "portal/base.html" %}

{% block title %}Perfil — D3{% endblock %}

{% block content %}
<h1>Mi Perfil</h1>
<dl style="display:grid; grid-template-columns:140px 1fr; gap:8px 16px; max-width:500px;">
  <dt style="font-weight:bold; color:#555;">Sub</dt><dd>{{ profile.sub }}</dd>
  <dt style="font-weight:bold; color:#555;">Email</dt><dd>{{ profile.email }}</dd>
  <dt style="font-weight:bold; color:#555;">Roles</dt><dd>{{ profile.roles|join:", " }}</dd>
  <dt style="font-weight:bold; color:#555;">Grupos</dt><dd>{{ profile.groups|join:", " }}</dd>
  <dt style="font-weight:bold; color:#555;">Último sync</dt><dd>{{ profile.last_synced_at }}</dd>
</dl>
{% endblock %}
