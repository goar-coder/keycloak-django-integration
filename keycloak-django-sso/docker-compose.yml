services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5433:5432"

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak_db
      KC_DB_USERNAME: keycloak_user
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HTTP_PORT: 8080
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME_URL: "http://localhost:8080"
      KC_HOSTNAME_ADMIN_URL: "http://localhost:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && echo -e 'GET /health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q '200'"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 60s

  d1:
    build: ./d1
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./d1:/app
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      D1_SECRET_KEY: ${D1_SECRET_KEY}
      D1_DATABASE_URL: postgres://d1_user:${D1_DB_PASSWORD}@postgres:5432/d1_db
      KEYCLOAK_SERVER_URL: ${KEYCLOAK_SERVER_URL:-http://keycloak:8080}
      KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-app-realm}
      D1_OIDC_CLIENT_ID: ${D1_OIDC_CLIENT_ID:-d1-client}
      D1_OIDC_CLIENT_SECRET: ${D1_OIDC_CLIENT_SECRET}
      D1_REDIRECT_URI: ${D1_REDIRECT_URI:-http://localhost:8001/oidc/callback/}
      D1_KC_SERVICE_ACCOUNT_CLIENT_ID: ${D1_KC_SERVICE_ACCOUNT_CLIENT_ID:-d1-client}
      D1_KC_SERVICE_ACCOUNT_CLIENT_SECRET: ${D1_KC_SERVICE_ACCOUNT_CLIENT_SECRET}
    ports:
      - "8001:8000"
    depends_on:
      keycloak:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  d2:
    build: ./d2
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./d2:/app
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      D2_SECRET_KEY: ${D2_SECRET_KEY}
      D2_DATABASE_URL: postgres://d2_user:${D2_DB_PASSWORD}@postgres:5432/d2_db
      KEYCLOAK_SERVER_URL: ${KEYCLOAK_SERVER_URL:-http://keycloak:8080}
      KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-app-realm}
      D2_OIDC_CLIENT_ID: ${D2_OIDC_CLIENT_ID:-d2-client}
      D2_OIDC_CLIENT_SECRET: ${D2_OIDC_CLIENT_SECRET}
      D2_REDIRECT_URI: ${D2_REDIRECT_URI:-http://localhost:8002/oidc/callback/}
    ports:
      - "8002:8000"
    depends_on:
      keycloak:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres_data:
